# Production deploy for the VPS — assumes Traefik on `root_default` network
# with the `mytlschallenge` cert resolver, matching UC4/UC2's pattern.
# Subdomain: rag-apple.butscher.cloud
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag_apple}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - traefik_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_apple}"]
      interval: 5s
      timeout: 3s
      retries: 10

  uc5-neo4j:
    # Renamed from "neo4j" to avoid clashing with the existing system Neo4j
    # already running on root_default. Not exposed publicly via Traefik —
    # the app talks to it on the internal Docker network only.
    image: neo4j:5.24-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - uc5_neo4jdata:/data
    networks:
      - traefik_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7474 > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag}@db:5432/${POSTGRES_DB:-rag_apple}
      NEO4J_URL: bolt://uc5-neo4j:7687
    depends_on:
      db:
        condition: service_healthy
      uc5-neo4j:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.rag-apple-http.rule=Host(`rag-apple.butscher.cloud`)"
      - "traefik.http.routers.rag-apple-http.entrypoints=web"
      - "traefik.http.routers.rag-apple-http.middlewares=rag-apple-https-redirect"
      - "traefik.http.middlewares.rag-apple-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.rag-apple-https-redirect.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.rag-apple.rule=Host(`rag-apple.butscher.cloud`)"
      - "traefik.http.routers.rag-apple.entrypoints=websecure"
      - "traefik.http.routers.rag-apple.tls=true"
      - "traefik.http.routers.rag-apple.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.rag-apple.tls.domains[0].main=rag-apple.butscher.cloud"
      - "traefik.http.services.rag-apple.loadbalancer.server.port=8000"
    networks:
      - traefik_net

volumes:
  pgdata:
  uc5_neo4jdata:

networks:
  traefik_net:
    external: true
    name: root_default
