<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHIL · PIM Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── Login Screen ─────────────────────────────────────────────────── -->
  <div id="login-screen" class="login-screen" hidden>
    <div class="login-card">
      <img src="phil.png" class="login-avatar" alt="PHIL"/>
      <h1 class="login-title">PHIL</h1>
      <p class="login-subtitle">Persönlicher Hochschul-Assistent</p>
      <form id="login-form" novalidate>
        <select id="login-institution" class="select" name="institution">
          <option value="THWS">THWS Würzburg-Schweinfurt</option>
          <option value="DHBW">DHBW</option>
        </select>
        <input id="login-username" type="text" class="input" name="username"
               placeholder="vorname.nachname" autocomplete="off" spellcheck="false"/>
        <input id="login-password" type="password" class="input" name="password"
               placeholder="Passwort" autocomplete="current-password"/>
        <div id="lockout-msg" class="lockout-msg" hidden></div>
        <button type="submit" class="btn btn--primary btn--full" id="btn-login">
          Anmelden
        </button>
      </form>
      <p class="security-notice">⚠ Credentials werden nicht gespeichert.</p>
    </div>
  </div>

  <!-- ── App ──────────────────────────────────────────────────────────── -->
  <div id="app" hidden>

    <!-- Header -->
    <header class="app-header">
      <span class="app-brand">PHIL</span>
      <div class="header-actions">
        <button id="btn-settings" class="icon-btn" aria-label="Einstellungen" title="Einstellungen">⚙</button>
        <button id="btn-phil-chat" class="phil-fab" aria-label="PHIL Chat öffnen">
          <img src="phil.png" class="phil-fab-img" alt="Phil"/>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">

      <!-- Dashboard View -->
      <div id="view-dashboard" class="view">
        <div class="view-scroll">
          <div class="tile-grid">
            <div class="tile tile--vip" data-filter="VIP" role="button" tabindex="0" aria-label="VIP Mails">
              <span class="tile-count" id="count-vip">0</span>
              <span class="tile-label">VIP</span>
            </div>
            <div class="tile tile--aktion" data-filter="Aktion nötig" role="button" tabindex="0" aria-label="Aktion nötig">
              <span class="tile-count" id="count-aktion">0</span>
              <span class="tile-label">Aktion nötig</span>
            </div>
            <div class="tile tile--info" data-filter="Nur Info" role="button" tabindex="0" aria-label="Nur Info">
              <span class="tile-count" id="count-info">0</span>
              <span class="tile-label">Nur Info</span>
            </div>
            <div class="tile tile--ignorieren" data-filter="Ignorieren" role="button" tabindex="0" aria-label="Ignorieren">
              <span class="tile-count" id="count-ignorieren">0</span>
              <span class="tile-label">Ignorieren</span>
            </div>
          </div>

          <section class="widget" id="calendar-widget">
            <h2 class="widget-title">Kalender — Heute &amp; Morgen</h2>
            <div id="calendar-preview" class="widget-content">
              <p class="widget-empty">Lade Kalender…</p>
            </div>
          </section>

          <section class="widget" id="tasks-widget">
            <h2 class="widget-title">Offene Aufgaben</h2>
            <div id="tasks-preview" class="widget-content">
              <p class="widget-empty">Lade Aufgaben…</p>
            </div>
          </section>
        </div>
      </div>

      <!-- Mails View -->
      <div id="view-mails" class="view view--hidden">
        <div class="view-scroll">
          <div class="filter-pills" id="mail-filters" role="group" aria-label="Mail-Filter">
            <button class="pill pill--active" data-cat="all">Alle</button>
            <button class="pill pill--vip" data-cat="VIP">VIP</button>
            <button class="pill pill--aktion" data-cat="Aktion nötig">Aktion</button>
            <button class="pill pill--info" data-cat="Nur Info">Info</button>
            <button class="pill pill--ignorieren" data-cat="Ignorieren">Ignorieren</button>
          </div>
          <div id="mails-list" aria-live="polite"></div>
        </div>
      </div>

      <!-- Kalender View -->
      <div id="view-calendar" class="view view--hidden">
        <div class="view-scroll">
          <div id="calendar-list" aria-live="polite"></div>
        </div>
        <button class="fab" id="btn-add-event" aria-label="Termin erstellen">+</button>
      </div>

      <!-- Aufgaben View -->
      <div id="view-tasks" class="view view--hidden">
        <div class="view-scroll">
          <div id="tasks-list" aria-live="polite"></div>
        </div>
        <button class="fab" id="btn-add-task" aria-label="Aufgabe erstellen">+</button>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="Hauptnavigation">
      <button class="nav-item nav-item--active" data-view="dashboard">
        <span class="nav-icon">⊞</span>
        <span>Start</span>
      </button>
      <button class="nav-item" data-view="mails">
        <span class="nav-icon">✉</span>
        <span>Mails</span>
      </button>
      <button class="nav-item" data-view="calendar">
        <span class="nav-icon">⊡</span>
        <span>Kalender</span>
      </button>
      <button class="nav-item" data-view="tasks">
        <span class="nav-icon">✓</span>
        <span>Aufgaben</span>
      </button>
    </nav>

    <!-- Phil Chat Panel -->
    <div id="phil-chat" class="chat-panel chat-panel--closed" role="dialog"
         aria-label="PHIL Chat" aria-hidden="true">
      <div class="chat-header">
        <img src="phil.png" class="chat-avatar" alt="Phil"/>
        <span class="chat-title">Frag PHIL</span>
        <button id="btn-close-chat" class="icon-btn" aria-label="Chat schließen">✕</button>
      </div>
      <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="input chat-input" placeholder="Stell PHIL eine Frage…"
               aria-label="Nachricht an PHIL"/>
        <button id="btn-chat-send" class="btn btn--primary" aria-label="Senden">→</button>
      </div>
    </div>
    <div id="chat-backdrop" class="backdrop backdrop--hidden" aria-hidden="true"></div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal modal--hidden" role="dialog"
         aria-label="Einstellungen" aria-modal="true">
      <div class="modal-card">
        <div class="modal-header">
          <h2 class="modal-title">Einstellungen</h2>
          <button id="btn-close-settings" class="icon-btn" aria-label="Schließen">✕</button>
        </div>
        <div id="settings-info" class="settings-info"></div>
        <div class="modal-actions">
          <button class="btn btn--ghost btn--full" id="btn-reload-mails">
            ↺ Mails neu laden
          </button>
          <button class="btn btn--danger btn--full" id="btn-logout">
            Abmelden
          </button>
        </div>
      </div>
    </div>
    <div id="modal-backdrop" class="backdrop backdrop--hidden" aria-hidden="true"></div>

    <!-- Create Event Modal -->
    <div id="event-modal" class="modal modal--hidden" role="dialog"
         aria-label="Termin erstellen" aria-modal="true">
      <div class="modal-card">
        <div class="modal-header">
          <h2 class="modal-title">Termin erstellen</h2>
          <button id="btn-close-event" class="icon-btn" aria-label="Schließen">✕</button>
        </div>
        <form id="event-form" class="create-form" novalidate>
          <input class="input" id="event-subject" placeholder="Titel" required/>
          <input class="input" id="event-start" type="datetime-local" required/>
          <input class="input" id="event-end" type="datetime-local" required/>
          <input class="input" id="event-location" placeholder="Ort (optional)"/>
          <textarea class="input textarea-sm" id="event-body" placeholder="Beschreibung (optional)" rows="2"></textarea>
          <button type="submit" class="btn btn--primary btn--full" id="btn-save-event">Speichern</button>
        </form>
      </div>
    </div>

    <!-- Create Task Modal -->
    <div id="task-modal" class="modal modal--hidden" role="dialog"
         aria-label="Aufgabe erstellen" aria-modal="true">
      <div class="modal-card">
        <div class="modal-header">
          <h2 class="modal-title">Aufgabe erstellen</h2>
          <button id="btn-close-task" class="icon-btn" aria-label="Schließen">✕</button>
        </div>
        <form id="task-form" class="create-form" novalidate>
          <input class="input" id="task-subject" placeholder="Bezeichnung" required/>
          <input class="input" id="task-due" type="date"/>
          <select class="select" id="task-priority">
            <option value="Normal">Priorität: Normal</option>
            <option value="High">Priorität: Hoch</option>
            <option value="Low">Priorität: Niedrig</option>
          </select>
          <textarea class="input textarea-sm" id="task-body" placeholder="Beschreibung (optional)" rows="2"></textarea>
          <button type="submit" class="btn btn--primary btn--full" id="btn-save-task">Speichern</button>
        </form>
      </div>
    </div>
    <div id="form-backdrop" class="backdrop backdrop--hidden" aria-hidden="true"></div>

  </div><!-- /#app -->

  <audio id="audio-player" aria-hidden="true"></audio>
  <script type="module" src="app.js"></script>
</body>
</html>
